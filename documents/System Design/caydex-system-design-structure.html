<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caydex · Data-Flow & Feature Structure</title>
<!--
  Caydex — feature-level DATA-FLOW map (standalone, offline, no external assets).
  For each feature: iOS screen → endpoint → service → external APIs (FMP/Gemini/…) → data → cache,
  plus the exact technologies/APIs involved and improvement opportunities.
  Source of truth: SYSTEM_DESIGN_GUIDELINES.md · caydex-report-system-design.html · the codebase.
  MAINTENANCE: edit the FEATURES array near the bottom — the diagram + panels re-render from it.
-->
<style>
  :root{
    --bg:#ffffff; --ink:#111827; --muted:#5b6675; --faint:#8894a5;
    --panel:#fbfcfe; --line:#e6e9ef; --border:rgba(17,24,39,.10); --border2:rgba(17,24,39,.18);
    --shadow:0 10px 30px rgba(17,24,39,.07);
    /* node/tech kind colors */
    --client:#0284c7; --api:#4f46e5; --service:#475569; --cache:#0d9488;
    --fmp:#d97706; --ai:#7c3aed; --ext:#e11d48; --store:#059669;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Inter","Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(900px 480px at 12% -6%, rgba(2,132,199,.05), transparent 60%),
      radial-gradient(820px 460px at 100% 4%, rgba(124,58,237,.05), transparent 55%);min-height:100vh}
  ::selection{background:rgba(2,132,199,.22)}

  header.top{position:sticky;top:0;z-index:30;backdrop-filter:blur(12px);
    background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.75));
    border-bottom:1px solid var(--line);padding:14px clamp(16px,3vw,30px);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#04121a;
    background:conic-gradient(from 210deg,#0284c7,#7c3aed,#059669,#d97706,#0284c7);box-shadow:0 6px 18px rgba(2,132,199,.28)}
  .brand h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.2px}
  .brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}
  .top .sp{flex:1}
  .legend{display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center}
  .lk{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
  .lk .sw{width:11px;height:11px;border-radius:3px;border:1.5px solid var(--c);background:color-mix(in srgb,var(--c) 12%,#fff)}

  .wrap{display:grid;grid-template-columns:236px minmax(0,1fr);gap:0;max-width:1560px;margin:0 auto;align-items:start}
  @media (max-width:940px){ .wrap{grid-template-columns:1fr} nav.side{position:static;border-right:none;border-bottom:1px solid var(--line)} }

  /* nav */
  nav.side{position:sticky;top:69px;align-self:start;border-right:1px solid var(--line);padding:16px 12px 40px;
    max-height:calc(100vh - 69px);overflow:auto}
  .navgroup{font-size:10.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--faint);font-weight:700;margin:16px 8px 6px}
  .navitem{display:flex;align-items:center;gap:9px;width:100%;text-align:left;font-family:inherit;font-size:13.4px;color:var(--ink);
    background:transparent;border:1px solid transparent;border-radius:9px;padding:8px 9px;cursor:pointer;transition:.12s;margin:1px 0}
  .navitem:hover{background:var(--panel);border-color:var(--border)}
  .navitem.active{background:color-mix(in srgb,var(--api) 8%,#fff);border-color:color-mix(in srgb,var(--api) 40%,transparent);font-weight:600}
  .navitem .ic{font-size:15px;flex:none}
  .navitem .nl{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* main */
  main.doc{padding:26px clamp(16px,3vw,40px) 70px;min-width:0}
  .fhead{margin-bottom:18px}
  .fhead .kick{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--api);font-weight:800}
  .fhead h2{margin:5px 0 6px;font-size:24px;font-weight:750;letter-spacing:.2px}
  .fhead .what{font-size:14.5px;color:#374151;max-width:74ch}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .schip{font-size:11.5px;color:var(--muted);border:1px solid var(--border);background:var(--panel);border-radius:999px;padding:4px 10px}
  .schip b{color:var(--ink);font-weight:600}

  .cols{display:grid;grid-template-columns:minmax(0,560px) minmax(0,1fr);gap:30px;align-items:start;margin-top:8px}
  @media (max-width:1080px){ .cols{grid-template-columns:1fr} }

  /* flow diagram */
  .flowwrap{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#fcfdff);padding:22px 18px;box-shadow:var(--shadow)}
  .flow{display:flex;flex-direction:column;align-items:stretch;gap:0}
  .step{display:flex;gap:10px;justify-content:center}
  .node{flex:1 1 0;min-width:0;border:1.4px solid var(--c);border-radius:12px;padding:11px 13px;
    background:color-mix(in srgb,var(--c) 6.5%,#fff);position:relative;transition:.14s}
  .node:hover{box-shadow:0 6px 16px rgba(17,24,39,.10);transform:translateY(-1px)}
  .node .tag{font-size:9.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--c)}
  .node .t{font-weight:650;font-size:13.6px;margin-top:2px;letter-spacing:.1px;color:#111827}
  .node .t code{font-family:var(--mono);font-size:12px;background:transparent;padding:0;color:#111827}
  .node .s{font-size:11.6px;color:var(--muted);margin-top:3px;line-height:1.4}
  .arrow{height:22px;display:flex;align-items:center;justify-content:center;color:#b4bcc8}
  .arrow svg{width:16px;height:22px}
  .arrow.split{color:#c2cad6}
  .steplabel{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);text-align:center;margin:4px 0 -2px}

  /* side panels */
  .side-panels{display:flex;flex-direction:column;gap:18px;position:sticky;top:88px}
  @media (max-width:1080px){ .side-panels{position:static} }
  .panel{border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow);overflow:hidden}
  .panel h3{margin:0;padding:13px 16px;font-size:11.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:700;
    border-bottom:1px solid var(--line);background:var(--panel)}
  .panel .pb{padding:12px 16px 15px}
  .api{display:flex;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);align-items:flex-start}
  .api:last-child{border-bottom:none}
  .api .dot{width:9px;height:9px;border-radius:50%;background:var(--c);flex:none;margin-top:5px}
  .api .n{font-size:13px;font-weight:600;color:#1f2937}
  .api .n code{font-family:var(--mono);font-size:11.5px;color:#0369a1;background:rgba(2,132,199,.08);border-radius:5px;padding:1px 5px}
  .api .d{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45}
  .cacheline{font-size:12.8px;color:#374151}
  .cacheline b{color:#111827}
  .improve{border-left:3px solid var(--fmp);background:#fffbeb;border-radius:0 8px 8px 0;padding:2px 14px 2px}
  .improve ul{margin:10px 0;padding-left:18px}
  .improve li{font-size:12.8px;color:#3f4756;margin:7px 0;line-height:1.5}
  .improve li b{color:#92400e}
  code.k{font-family:var(--mono);font-size:12px;background:#f3f4f6;border-radius:5px;padding:1px 5px;color:#111827}

  footer.foot{max-width:1560px;margin:0 auto;padding:18px clamp(16px,3vw,40px) 40px;color:var(--faint);font-size:12px;border-top:1px solid var(--line)}
  footer.foot code{font-family:var(--mono)}
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="logo">C</div>
    <div><h1>Caydex · Data-Flow & Feature Structure</h1><p>How data moves per feature — and which tech / APIs power it</p></div>
  </div>
  <div class="sp"></div>
  <div class="legend" id="legend"></div>
</header>

<div class="wrap">
  <nav class="side" id="nav"></nav>
  <main class="doc" id="doc"></main>
</div>

<footer class="foot">
  Living document · re-renders from the <code>FEATURES</code> array in this file. FMP endpoints are on the <code>/stable</code> API; Gemini = Flash tier. Keep in sync with <b>SYSTEM_DESIGN_GUIDELINES.md</b>.
</footer>

<script>
/* ============================================================================
   KIND METADATA (colors + legend labels)
   ========================================================================== */
const KINDS = {
  client:{c:"var(--client)",label:"Client / iOS"},
  api:{c:"var(--api)",label:"API endpoint"},
  service:{c:"var(--service)",label:"Backend service"},
  cache:{c:"var(--cache)",label:"Cache tier"},
  fmp:{c:"var(--fmp)",label:"FMP (market data)"},
  ai:{c:"var(--ai)",label:"Gemini / AI"},
  ext:{c:"var(--ext)",label:"Other external API"},
  store:{c:"var(--store)",label:"Supabase / store"},
};

/* ============================================================================
   FEATURES — the data model. Each feature renders a flow + tech panel + notes.
   node = {k:kind, t:title(html), s:subtitle}. steps = array of rows; a row is
   an array of nodes (1–3 nodes side-by-side = a parallel branch).
   ========================================================================== */
const FEATURES = [
  /* ---------------------------------------------------------------- HOME */
  { id:"home", group:"Home", icon:"🏠", name:"Home Dashboard",
    screen:"HomeDashboardView", latency:"~0.3–0.8s (warm)",
    what:"One aggregated call paints the whole Home tab. Four sections — Market Pulse, Daily Scanners, App-Exclusive Signals, Emerging Frontiers — build in parallel and degrade independently, so a slow sub-build never blocks the screen.",
    steps:[
      [{k:"client",t:"HomeDashboardView · HomeRepository",s:"one request on appear; views render preformatted strings"}],
      [{k:"api",t:"GET <code>/api/v1/home/dashboard</code>",s:"public · single response envelope"}],
      [{k:"service",t:"home_dashboard_service + signals_service",s:"4 sub-builds in parallel · each own cache + _inflight + 8s shield"}],
      [{k:"fmp",t:"FMP /stable",s:"quotes · gainers/losers/actives · profile batch · earnings-cal · senate/house"},
       {k:"ext",t:"FINRA short interest",s:"movers short% + shorts card"},
       {k:"store",t:"Supabase (pre-hydrated)",s:"whales · whale_holdings · trending_themes"}],
      [{k:"cache",t:"Two-tier cache-aside",s:"Pulse 5m · Scanners 20m · Themes 10m · signals_cache 24h"}],
      [{k:"store",t:"HomeDashboardResponse → 4 section cards",s:"empty section ⇒ iOS hides it (per-section degradation)"}],
    ],
    apis:[
      {k:"fmp",n:"<code>get_stock_price_quote</code> → /stable/quote",d:"6 Pulse symbols (^GSPC ^IXIC ^DJI BTCUSD GCUSD CLUSD) + scanner ranking"},
      {k:"fmp",n:"<code>get_biggest_gainers/losers/most_actives</code>",d:"/stable/gainers · /losers · /actives → the in-play mover universe"},
      {k:"fmp",n:"<code>get_company_profiles_batch</code> → /stable/profile",d:"quality gate: marketCap ≥ $250M, avgVol ≥ 1M, major exchange (chunked at 50)"},
      {k:"fmp",n:"<code>get_earnings_calendar</code> · <code>get_senate/house_latest</code>",d:"Earnings Shockers + Congress Buys signal cards"},
      {k:"fmp",n:"chart_helper 1D intraday",d:"5-min bars → 30-pt sparkline for each Pulse tile"},
      {k:"ext",n:"FINRA / Nasdaq / Yahoo short interest",d:"shares_short ÷ float; 3-day cache (FINRA publishes ~2×/month)"},
      {k:"store",n:"Supabase: whales · whale_holdings · trending_themes",d:"Signals + Themes read pre-hydrated rows — NO live 13F on the request path"},
      {k:"store",n:"Supabase: signals_cache · short_interest_cache",d:"Tier-2 24h / 3d persistence across restarts"},
    ],
    cache:"Per-section Tier-1 dict (5/20/10 min) + Tier-2 <code>signals_cache</code> (24h) & <code>short_interest_cache</code> (3d); every build is <code>_inflight</code>-deduped and wrapped in an 8s <code>asyncio.shield</code> timeout so a cold sub-build ships on the next request instead of blocking.",
    improve:[
      "<b>Quote fan-out is duplicated</b> — Market Pulse fetches 6 quotes and the scanners fetch ~90 profiles+quotes independently (no shared quote cache). A shared per-symbol quote cache could dedup them.",
      "<b>Scanners dominate FMP cost</b> (~90 profile calls/build). The 20-min cache + market-hours pre-warmer keep it off the request path — keep the pre-warmer enabled in prod.",
      "Signals are Supabase-only on the request path (fast) — the FMP/13F work happens in the daily hydration job. Good separation to preserve.",
    ] },

  { id:"themes", group:"Home", icon:"🚀", name:"Emerging Frontiers (theme detail)",
    screen:"ThemeDetailView", latency:"~0.3s",
    what:"Tapping a theme card opens a server-driven detail screen: an editorial hero + the theme's constituent companies with live price/change. Editors change tickers/images in Supabase with no app release.",
    steps:[
      [{k:"client",t:"ThemeDetailView (tap a theme card)",s:"slug passed from the dashboard card"}],
      [{k:"api",t:"GET <code>/home/themes/{slug}</code>",s:"public · 404 THEME_NOT_FOUND if inactive"}],
      [{k:"service",t:"home_dashboard_service.get_theme_detail",s:"read the row → resolve its tickers to live quotes"}],
      [{k:"store",t:"Supabase trending_themes",s:"slug/title/subtitle/image_url/tickers[] (editable)"},
       {k:"fmp",t:"FMP get_batch_quotes",s:"ONE deduped fan-out · price/change/marketCap/name"}],
      [{k:"service",t:"sort by market-cap desc · format",s:"count + avg % computed live from the tickers"}],
      [{k:"store",t:"ThemeDetailResponse → hero + companies list",s:"row tap → TickerDetailView"}],
    ],
    apis:[
      {k:"fmp",n:"<code>get_batch_quotes</code> → /stable/quote",d:"one call over the deduped ticker union → price, change, marketCap, name"},
      {k:"store",n:"Supabase: <code>trending_themes</code>",d:"editorial content (migrations 081/082); a DB edit updates the card with no release"},
      {k:"store",n:"Supabase Storage: <code>home-theme-media</code>",d:"hero images; swap the URL, no app update"},
    ],
    cache:"10-min Tier-1 dict + <code>_inflight</code> (slug-keyed, case-sensitive). No Tier-2 — the row read is cheap and the FMP change is the only computed part.",
    improve:[
      "The card's <code>ticker_count</code> + avg % are computed live from the DB tickers — <b>editing tickers instantly changes the card</b>, no rebuild. Great for iteration.",
      "The detail sends the full constituent list; if a theme grows large, consider paginating or capping the quoted set.",
    ] },

  /* --------------------------------------------------------------- STOCK */
  { id:"overview", group:"Stock Detail", icon:"📈", name:"Stock Overview (+ fast core)",
    screen:"TickerDetailView", latency:"core ~0.5s · full ~2–5s cold",
    what:"The Overview tab. The screen fires TWO calls in parallel: a fast 'core' (price + intraday chart + name) that paints instantly, and the full aggregation that supersedes it. On open it also warms a future report's data cache.",
    steps:[
      [{k:"client",t:"TickerDetailView · TickerDetailViewModel",s:"fires core + full in parallel; also POST /prewarm-report"}],
      [{k:"api",t:"GET /overview/core",s:"fast subset"},
       {k:"api",t:"GET /overview",s:"full aggregation"}],
      [{k:"service",t:"stock_overview_service",s:"core = quote+chart+profile · full = fundamentals bundle + snapshots"}],
      [{k:"fmp",t:"FMP fast path",s:"quote + intraday chart + profile (~0.5s)"},
       {k:"fmp",t:"FMP full path",s:"14 parallel calls incl. IPO→today history (2–5s)"}],
      [{k:"cache",t:"Two-tier",s:"volatile 120s · fundamentals 1h dict + stock_fundamentals_cache 24h · snapshot caches"}],
      [{k:"store",t:"StockOverview(Core)Response",s:"price header · chart · key stats · performance · snapshots"}],
    ],
    apis:[
      {k:"fmp",n:"<code>get_stock_price_quote</code> · <code>get_company_profile</code>",d:"/stable/quote · /stable/profile — the fast-core pair"},
      {k:"fmp",n:"chart_helper (intraday / historical)",d:"1D/1W = fast intraday; 3M+/5Y/ALL = daily/aggregated (the slow path)"},
      {k:"fmp",n:"<code>get_key_metrics(_ttm)</code> · <code>get_financial_ratios(_ttm)</code>",d:"/stable/key-metrics* · /stable/ratios* — key statistics"},
      {k:"fmp",n:"<code>get_income/balance/cash_flow_statement</code>",d:"/stable/*-statement — fundamentals + health"},
      {k:"fmp",n:"<code>get_historical_prices</code> (ticker + SPY)",d:"/stable/historical-price-eod/full from 1900 → performance/benchmark. THE 2–5s bottleneck.",},
      {k:"fmp",n:"<code>get_analyst_estimates</code> · <code>get_shares_float</code> · <code>get_institutional_ownership_summary</code>",d:"estimates + float + ownership context"},
      {k:"store",n:"Supabase: <code>stock_fundamentals_cache</code> · <code>snapshot_cache</code> · <code>ticker_data_cache</code>",d:"Tier-2 24h; the report collector reuses the same rows (partial warm)"},
    ],
    cache:"Volatile (quote+chart) 120s dict · fundamentals 1h dict + <code>stock_fundamentals_cache</code> 24h Supabase · 5 snapshot services (5-min dict + 24h Supabase) · <code>_inflight</code> per ticker. The fast-core has its own 120s cache and never touches the slow bundle.",
    improve:[
      "<b>The two IPO-to-present <code>get_historical_prices</code> calls (ticker + SPY) are the dominant latency</b> — needed for all-time CAGR + vs-SPY. SPY history is already cached 1h; consider a longer SPY cache and precomputing all-time CAGR nightly.",
      "The <b>fast-core split</b> already hides this: price+chart paint in ~0.5s while the full call loads — extend the same core-first pattern to the sibling detail screens (index/crypto/etf) if they feel slow.",
      "Opening the detail view <b>partial-warms a future report</b> (shared caches) — a real efficiency win worth keeping.",
    ] },

  { id:"tabs", group:"Stock Detail", icon:"🗂️", name:"Stock Detail — supplementary tabs",
    screen:"TickerDetailView (News / Analysis / Financials / Holders)", latency:"streamed, non-blocking",
    what:"After the overview paints, the ViewModel fires ~11 supplementary endpoints in parallel (Phase 2), each streamed with its own loading flag. Every tab is its own cached service — the app never blocks on them.",
    steps:[
      [{k:"client",t:"TickerDetailView tabs (Phase-2 fan-out)",s:"11 parallel fetches after the overview lands"}],
      [{k:"api",t:"GET /stocks/{ticker}/{news · analyst-analysis · sentiment · technical-analysis · earnings · growth · profit-power · revenue-breakdown · health-check · signal-of-confidence · holders}",s:""}],
      [{k:"service",t:"one cached service per tab",s:"news_service · analyst · sentiment · technical · earnings · growth · profit_power · …"}],
      [{k:"fmp",t:"FMP",s:"statements · ratios · grades · estimates · segmentation · calendar · news"},
       {k:"ext",t:"ApeWisdom · Alternative.me · FINRA",s:"social sentiment · Fear&Greed · short/Congress"}],
      [{k:"cache",t:"Two-tier per tab",s:"news 1h · sentiment ~6h · fundamentals 24h · _inflight"}],
      [{k:"store",t:"per-tab responses → tab content",s:"each renders as its data arrives"}],
    ],
    apis:[
      {k:"fmp",n:"News → <code>get_stock_news</code>",d:"/stable/stock_news · <code>news_cache</code> 1h"},
      {k:"fmp",n:"Analyst → <code>get_grades</code> · <code>get_price_target_consensus</code>",d:"/stable/grades · /stable/price-target-consensus"},
      {k:"fmp",n:"Earnings → <code>get_earning_calendar_full</code> + <code>get_analyst_estimates</code>",d:"/stable/earnings — surprise vs the announced non-GAAP actual"},
      {k:"fmp",n:"Growth / Profit Power / Health / Revenue",d:"income/ratios/balance/cash-flow + /stable/revenue-product-segmentation"},
      {k:"ext",n:"Sentiment → ApeWisdom + Alternative.me + FMP social",d:"Reddit mentions + crypto Fear&Greed + /stable/social_sentiment"},
      {k:"ext",n:"Holders → FMP institutional + Congress disclosures",d:"/stable/institutional-holdings + senate/house-disclosure"},
    ],
    cache:"Each tab = Tier-1 dict + Tier-2 <code>*_cache</code> (news 1h · sentiment ~6h · technical ~5h · fundamentals 24h) + <code>_inflight</code>. ~8–9 of these are the exact caches the report collector reuses.",
    improve:[
      "Tabs are already <b>lazy + streamed</b> (per-section loading flags) — no wasted work for tabs the user never opens beyond the first fan-out.",
      "Sentiment adds three upstreams (ApeWisdom, Alternative.me, FMP social) — the slowest of the tab set; its ~6h cache is appropriate.",
      "Consider making the Phase-2 fan-out <b>tab-triggered</b> (fetch a tab's data on first tab-select) rather than all 11 on open, to cut cold-open upstream load.",
    ] },

  /* ------------------------------------------------------------ RESEARCH */
  { id:"research", group:"Research", icon:"🤖", name:"Research Report (multi-agent)",
    screen:"TickerReportView", latency:"first ~1 min · 100 reports ~10–15 min",
    what:"The credit-charged, AI-generated deep report. An admission gate sheds load, a global semaphore paces Gemini, and a two-stage agent collects data (FMP) then narrates per persona (Gemini). A conditional completion write delivers it, XOR a reconciliation job refunds it.",
    steps:[
      [{k:"client",t:"TickerReportView → POST /research/generate",s:"pick ticker + persona"}],
      [{k:"api",t:"Admission gate (pre-charge)",s:"per-user ≤4 · global ≤150 → else 409 SYSTEM_BUSY"}],
      [{k:"service",t:"charge 5 credits · pending row · fire-and-forget task",s:"user_credits − · research_reports = queue + store"}],
      [{k:"cache",t:"shared ticker_data_cache lookup",s:"persona-neutral; same ticker ⇒ 1 collection via _INFLIGHT"}],
      [{k:"service",t:"Global agent-run semaphore = 8 (the gate)",s:"8 run · the rest queue and drain in waves"}],
      [{k:"fmp",t:"Stage A — collect",s:"~25–40 FMP calls · shared 20-conn pool · 750 rpm"},
       {k:"ai",t:"Stage B — narrate",s:"~22 Gemini calls · 15 parallel · context-cached · 429 backoff + breaker"}],
      [{k:"store",t:"conditional completion write → delivered",s:"XOR refund safety net (processing_started_at clock)"}],
    ],
    apis:[
      {k:"fmp",n:"Stage A collector — ~20 FMP methods",d:"profile · quote · key-metrics(_ttm) · ratios(_ttm) · income/balance/cashflow · estimates · grades · price-target · institutional · earnings · news · segmentation"},
      {k:"ai",n:"Gemini (Flash) — Stage A tools + Stage B narration",d:"function-calling via <code>fmp_tools</code> (~15 tools, max 4 rounds) · 15 parallel narratives · core-thesis synthesis"},
      {k:"ext",n:"FRED · ApeWisdom · FINRA (macro grounding)",d:"inflation/rates/yield-curve + social + short interest → the report's critical-factors"},
      {k:"store",n:"Supabase: <code>research_reports</code> · <code>ticker_data_cache</code> · <code>user_credits</code>",d:"queue+content · persona-neutral shared cache (~6h) · credit ledger"},
    ],

const $ = (s,el=document)=>el.querySelector(s);
const featMap = Object.fromEntries(FEATURES.map(f=>[f.id,f]));

/* legend */
(function(){
  const box = $("#legend");
  Object.entries(KINDS).forEach(([k,v])=>{
    const s=document.createElement("span"); s.className="lk"; s.style.setProperty("--c",v.c);
    s.innerHTML=`<span class="sw"></span>${v.label}`; box.appendChild(s);
  });
})();

/* nav */
(function(){
  const nav=$("#nav"); let lastGroup=null;
  FEATURES.forEach(f=>{
    if(f.group!==lastGroup){ const g=document.createElement("div"); g.className="navgroup"; g.textContent=f.group; nav.appendChild(g); lastGroup=f.group; }
    const b=document.createElement("button"); b.className="navitem"; b.id="nav-"+f.id;
    b.innerHTML=`<span class="ic">${f.icon}</span><span class="nl">${f.name}</span>`;
    b.onclick=()=>select(f.id); nav.appendChild(b);
  });
})();

function node(n){
  if(n.k==="steplabel") return `<div class="steplabel">↑ request path · ↓ background job</div>`;
  const c=KINDS[n.k]?KINDS[n.k].c:"var(--service)";
  const tag=(KINDS[n.k]?KINDS[n.k].label:n.k).toUpperCase();
  return `<div class="node" style="--c:${c}"><div class="tag">${tag}</div>
    <div class="t">${n.t||""}</div>${n.s?`<div class="s">${n.s}</div>`:""}</div>`;
}
const CHEV=`<svg viewBox="0 0 16 22" fill="none"><path d="M8 2v14M3 12l5 6 5-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function renderFlow(steps){
  let h=`<div class="flow">`;
  steps.forEach((row,i)=>{
    if(row.length===1 && row[0].k==="steplabel"){ h+=node(row[0]); return; }
    h+=`<div class="step">${row.map(node).join("")}</div>`;
    if(i<steps.length-1){ const nextIsLabel = steps[i+1].length===1 && steps[i+1][0].k==="steplabel"; h+=`<div class="arrow${row.length>1?' split':''}">${nextIsLabel?"":CHEV}</div>`; }
  });
  h+=`</div>`; return h;
}

function select(id){
  const f=featMap[id]; if(!f) return;
  document.querySelectorAll(".navitem.active").forEach(e=>e.classList.remove("active"));
  const nb=document.getElementById("nav-"+id); if(nb) nb.classList.add("active");

  const apis=f.apis.map(a=>{
    const c=KINDS[a.k]?KINDS[a.k].c:"var(--service)";
    return `<div class="api" style="--c:${c}"><span class="dot"></span><div><div class="n">${a.n}</div>${a.d?`<div class="d">${a.d}</div>`:""}</div></div>`;
  }).join("");
  const improve=f.improve.map(x=>`<li>${x}</li>`).join("");

  $("#doc").innerHTML=`
    <div class="fhead">
      <div class="kick" style="color:var(--api)">${f.group}</div>
      <h2>${f.icon} ${f.name}</h2>
      <div class="what">${f.what}</div>
      <div class="chips">
        <span class="schip"><b>Screen:</b> ${f.screen}</span>
        ${f.latency&&f.latency!=="—"?`<span class="schip"><b>Latency:</b> ${f.latency}</span>`:""}
      </div>
    </div>
    <div class="cols">
      <div class="flowwrap">${renderFlow(f.steps)}</div>
      <div class="side-panels">
        <div class="panel"><h3>Technologies & APIs involved</h3><div class="pb">${apis}</div></div>
        <div class="panel"><h3>Caching & performance</h3><div class="pb"><div class="cacheline">${f.cache}</div></div></div>
        <div class="panel"><h3>Improvement opportunities</h3><div class="pb"><div class="improve"><ul>${improve}</ul></div></div></div>
      </div>
    </div>`;
  if(window.innerWidth<=940){ $("#doc").scrollIntoView({behavior:"smooth",block:"start"}); }
}

select("home");
