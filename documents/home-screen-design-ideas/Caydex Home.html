document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

.currentTarget; const st=this._stride()||1; const i=Math.max(0,Math.min(2,Math.round(el.scrollLeft/st))); if(i!==this.state.activeScanner) this.setState({ activeScanner:i }); }\n\n  renderVals(){\n    const G='#22C55E', R='#EF4444', A='#F59E0B', MUTE='#6B7280';\n    const gf='rgba(34,197,94,.16)', rf='rgba(239,68,68,.16)', af='rgba(245,158,11,.14)';\n    const sp=(s)=>{ const a=s.trim().split(/\\s+/); const ey=parseFloat(a[a.length-1].split(',')[1]); return { pts:s, area:'M'+a.join(' L')+' L100,36 L0,36 Z', ey }; };\n    const tone=(up)=>({ sc: up?G:R, fill: up?gf:rf, vc: up?G:R });\n\n    const pulseRaw=[\n      ['S&P 500','6,952.40','+0.62%',true,'0,28 14,24 28,26 42,18 56,21 70,13 84,16 100,8'],\n      ['Nasdaq','23,840.10','+0.94%',true,'0,30 14,27 28,22 42,24 56,16 70,18 84,11 100,6'],\n      ['Dow Jones','44,265.80','+0.18%',true,'0,22 14,24 28,20 42,22 56,19 70,21 84,17 100,15'],\n      ['Bitcoin','112,430','-1.85%',false,'0,9 14,13 28,11 42,17 56,15 70,21 84,19 100,27'],\n      ['Gold','3,486.20','+0.41%',true,'0,24 14,22 28,25 42,19 56,21 70,17 84,18 100,13'],\n      ['Crude Oil','70.95','-0.77%',false,'0,12 14,10 28,16 42,14 56,19 70,17 84,22 100,25'],\n    ];\n    const pulse=pulseRaw.map(([name,price,chg,up,s])=>({ name,price,chg,up,...sp(s),...tone(up) }));\n\n    const mk=(sym,name,val,price,up,s)=>({ sym,name,val,price,up,...sp(s),...tone(up) });\n    const gainers=[\n      mk('SMCI','Super Micro','+14.2%','58.30',true,'0,31 14,26 28,28 42,18 56,20 70,12 84,14 100,5'),\n      mk('ARM','Arm Holdings','+9.6%','198.70',true,'0,29 14,25 28,27 42,19 56,16 70,18 84,10 100,7'),\n      mk('AVGO','Broadcom','+8.1%','312.40',true,'0,27 14,24 28,20 42,22 56,15 70,17 84,11 100,8'),\n      mk('PLTR','Palantir','+6.7%','92.30',true,'0,26 14,22 28,24 42,17 56,19 70,13 84,15 100,9'),\n      mk('MU','Micron','+5.9%','148.20',true,'0,25 14,23 28,19 42,21 56,16 70,18 84,12 100,10'),\n      mk('TSM','Taiwan Semi','+5.2%','264.10',true,'0,24 14,21 28,23 42,16 56,18 70,14 84,15 100,11'),\n      mk('DELL','Dell Tech','+4.8%','158.40',true,'0,23 14,20 28,22 42,18 56,15 70,17 84,13 100,12'),\n      mk('AMD','Adv. Micro','+4.3%','214.60',true,'0,22 14,24 28,19 42,21 56,17 70,19 84,14 100,13'),\n    ];\n    const losers=[\n      mk('WBD','Warner Bros','-9.4%','9.10',false,'0,7 14,11 28,9 42,16 56,14 70,20 84,22 100,29'),\n      mk('INTC','Intel','-7.8%','24.30',false,'0,8 14,12 28,10 42,15 56,18 70,17 84,23 100,27'),\n      mk('PARA','Paramount','-6.9%','13.40',false,'0,9 14,13 28,11 42,14 56,19 70,18 84,21 100,26'),\n      mk('F','Ford Motor','-5.2%','11.80',false,'0,11 14,10 28,15 42,13 56,18 70,20 84,19 100,24'),\n      mk('PYPL','PayPal','-4.7%','78.20',false,'0,10 14,14 28,12 42,16 56,15 70,19 84,18 100,23'),\n      mk('NKE','Nike','-4.1%','74.60',false,'0,12 14,11 28,16 42,14 56,17 70,16 84,20 100,22'),\n      mk('SBUX','Starbucks','-3.6%','96.30',false,'0,13 14,12 28,15 42,14 56,18 70,16 84,19 100,21'),\n      mk('T','AT&T','-3.1%','27.40',false,'0,12 14,14 28,13 42,16 56,15 70,18 84,17 100,20'),\n    ];\n    gainers.forEach((x,i)=>x.rank=i+1); losers.forEach((x,i)=>x.rank=i+1);\n    const movesList=this.state.movesMode==='gainers'?gainers:losers;\n    const movesHead=movesList[0];\n\n    const tk=(sym,name,mult,val,up,price,s)=>({ sym,name,mult,val,price,up,...sp(s),...tone(up) });\n    const traffic=[\n      tk('GME','GameStop','8.4×','+3.2%',true,'31.20','0,24 14,18 28,26 42,15 56,22 70,12 84,20 100,9'),\n      tk('HOOD','Robinhood','5.7×','+4.6%',true,'86.30','0,26 14,20 28,24 42,16 56,19 70,13 84,15 100,8'),\n      tk('SOFI','SoFi Tech','4.9×','+2.1%',true,'18.40','0,25 14,22 28,18 42,20 56,15 70,17 84,12 100,11'),\n      tk('RIVN','Rivian','4.2×','-1.8%',false,'14.70','0,12 14,10 28,16 42,14 56,18 70,17 84,21 100,24'),\n      tk('AMC','AMC Ent.','3.8×','+6.8%',true,'4.20','0,28 14,22 28,25 42,15 56,20 70,11 84,16 100,7'),\n      tk('LCID','Lucid','3.3×','-2.4%',false,'3.10','0,10 14,13 28,11 42,17 56,15 70,20 84,19 100,26'),\n      tk('NIO','NIO Inc','3.1×','+1.2%',true,'5.40','0,23 14,21 28,24 42,18 56,20 70,16 84,18 100,14'),\n      tk('PLUG','Plug Power','2.9×','-3.1%',false,'2.80','0,11 14,14 28,12 42,16 56,18 70,17 84,22 100,25'),\n    ];\n    traffic.forEach((x,i)=>x.rank=i+1);\n    const trafficHead=traffic[0];\n\n    const sk=(sym,name,short,price,s)=>({ sym,name,short,price,...sp(s), sc:A, fill:af });\n    const shorts=[\n      sk('BYND','Beyond Meat','41.2%','5.80','0,10 14,13 28,11 42,16 56,14 70,19 84,18 100,24'),\n      sk('WOLF','Wolfspeed','35.7%','8.40','0,11 14,10 28,15 42,13 56,17 70,16 84,21 100,23'),\n      sk('UPST','Upstart','32.6%','62.40','0,12 14,14 28,12 42,15 56,18 70,16 84,20 100,22'),\n      sk('RILY','B. Riley','30.2%','4.70','0,9 14,12 28,10 42,15 56,14 70,18 84,20 100,25'),\n      sk('AI','C3.ai','28.4%','24.60','0,13 14,11 28,16 42,14 56,17 70,15 84,19 100,21'),\n      sk('FUBO','fuboTV','26.1%','1.90','0,12 14,13 28,12 42,16 56,15 70,17 84,18 100,20'),\n      sk('BIGC','BigCommerce','24.9%','6.10','0,11 14,13 28,12 42,15 56,16 70,15 84,18 100,19'),\n      sk('CVNA','Carvana','22.8%','244.10','0,14 14,12 28,15 42,13 56,16 70,14 84,17 100,18'),\n    ];\n    shorts.forEach((x,i)=>x.rank=i+1);\n    const shortsHead=shorts[0];\n\n    const so=this.state.expandedSignal;\n    const signals=[\n      { id:0, title:'Congressional Buys', sub:'Most-bought on Capitol Hill this week', icon:'ic-landmark', accent:'#3B82F6', bg:'rgba(59,130,246,.16)', topSym:'NVDA', topStat:'7 members buying', items:[{sym:'NVDA',stat:'4 buys'},{sym:'MSFT',stat:'3 buys'},{sym:'GOOGL',stat:'2 buys'}] },\n      { id:1, title:'Whale Accumulation', sub:'Institutions quietly loading up', icon:'ic-layers', accent:'#F97316', bg:'rgba(249,115,22,.16)', topSym:'MSFT', topStat:'14 funds adding', items:[{sym:'MSFT',stat:'+$2.1B'},{sym:'AMZN',stat:'+$1.4B'},{sym:'META',stat:'+$0.9B'}] },\n      { id:2, title:'Earnings Shockers', sub:'Just beat or missed the Street big', icon:'ic-zap', accent:'#FACC15', bg:'rgba(250,204,21,.16)', topSym:'AVGO', topStat:'+22% surprise', items:[{sym:'AVGO',stat:'+22% EPS'},{sym:'CRM',stat:'+15% EPS'},{sym:'NOW',stat:'+12% EPS'}] },\n    ];\n    signals.forEach((x,i)=>{ x.disp=so===i?'block':'none'; x.rot=so===i?'rotate(180deg)':'rotate(0deg)'; x.toggle=()=>this.toggleSignal(i); });\n\n    const colorful=!!this.props.colorfulThemes;\n    const themeRaw=[\n      { title:'AI & Semiconductors', count:'28 stocks', pct:'+3.4%', icon:'ic-cpu', accent:'#22D3EE' },\n      { title:'Clean Energy & Grids', count:'22 stocks', pct:'+1.2%', icon:'ic-sun', accent:'#34D399' },\n      { title:'Blockchain & DeFi', count:'18 stocks', pct:'+5.1%', icon:'ic-hexagon', accent:'#C084FC' },\n      { title:'Defense & Aerospace', count:'16 stocks', pct:'+0.8%', icon:'ic-shield', accent:'#FBBF24' },\n    ];\n    const themes=themeRaw.map(t=>({\n      ...t,\n      tileBg: colorful ? 'linear-gradient(150deg, color-mix(in srgb, '+t.accent+' 22%, #181D2A), #161B27)' : '#1E2330',\n      tileBorder: colorful ? '1px solid color-mix(in srgb, '+t.accent+' 28%, transparent)' : '1px solid rgba(255,255,255,.05)',\n      iconBg: colorful ? 'color-mix(in srgb, '+t.accent+' 26%, transparent)' : 'color-mix(in srgb, '+t.accent+' 15%, transparent)',\n      iconColor: t.accent,\n    }));\n\n    const ms=this.state.movesMode;\n    const gainBg = ms==='gainers'?'#2b3344':'transparent';\n    const gainColor = ms==='gainers'?G:MUTE;\n    const loseBg = ms==='losers'?'#2b3344':'transparent';\n    const loseColor = ms==='losers'?R:MUTE;\n    const op=this.state.expandedScanner;\n    const mx=(i)=> op===i?'block':'none';\n    const rt=(i)=> op===i?'rotate(180deg)':'rotate(0deg)';\n    const ac=this.state.activeScanner;\n    const dotW=(i)=> ac===i?'20px':'6px';\n    const dotBg=(i)=> ac===i?'#3B82F6':'#39414d';\n\n    const st=this.state.selectedTab;\n    const tabsDef=[['home','Home','ic-home'],['updates','Updates','ic-doc-bars'],['research','Research','ic-search'],['tracking','Tracking','ic-star'],['wiser','Wiser','ic-bulb']];\n    const tabs=tabsDef.map(([key,label,icon])=>({ key,label,icon, color: st===key?'#3B82F6':MUTE, onTap:()=>this.selectTab(key) }));\n\n    const accentMap={ Cyan:'#06B6D4', Blue:'#3B82F6', Violet:'#A855F7' };\n    const exAccent=accentMap[this.props.exclusiveAccent]||'#06B6D4';\n    const exBg='color-mix(in srgb, '+exAccent+' 14%, transparent)';\n    const gap = this.props.compact ? '15px' : '22px';\n\n    return {\n      pulse, movesList, movesHead, traffic, trafficHead, shorts, shortsHead, signals, themes, tabs,\n      gainBg, gainColor, loseBg, loseColor,\n      scDisp0:mx(0), scDisp1:mx(1), scDisp2:mx(2), scRot0:rt(0), scRot1:rt(1), scRot2:rt(2),\n      dotW0:dotW(0), dotBg0:dotBg(0), dotW1:dotW(1), dotBg1:dotBg(1), dotW2:dotW(2), dotBg2:dotBg(2),\n      exAccent, exBg, gap,\n      setGainers:()=>this.setMovesMode('gainers'),\n      setLosers:()=>this.setMovesMode('losers'),\n      tgScan0:()=>this.toggleScanner(0), tgScan1:()=>this.toggleScanner(1), tgScan2:()=>this.toggleScanner(2),\n      goTo0:()=>this.goToScanner(0), goTo1:()=>this.goToScanner(1), goTo2:()=>this.goToScanner(2),\n      onScannerScroll:(e)=>this.onScannerScroll(e),\n      setCarousel:(el)=>this.setCarousel(el),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
