<svg width="100%" viewBox="0 0 680 624" role="img" xmlns="http://www.w3.org/2000/svg"><title>Data flow for 100 users generating 100 different reports</title><desc>100 concurrent report requests are admitted, charged, and queued, then drained eight at a time through the global agent semaphore; each running report does FMP and Gemini work before a conditional completion write or a refund.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.t{font-size:14px;fill:#111827}.th{font-size:14px;font-weight:500;fill:#111827}.ts{font-size:12px;fill:#6b7280}
.arr{stroke:#9ca3af;stroke-width:1.5;fill:none}
.c-gray>rect,rect.c-gray{fill:#f9fafb;stroke:#6b7280}.c-gray>.th{fill:#1f2937}.c-gray>.t{fill:#1f2937}.c-gray>.ts{fill:#4b5563}
.c-green>rect,rect.c-green{fill:#f0fdf4;stroke:#16a34a}.c-green>.th{fill:#166534}.c-green>.t{fill:#14532d}.c-green>.ts{fill:#16a34a}
.c-amber>rect,rect.c-amber{fill:#fffbeb;stroke:#d97706}.c-amber>.th{fill:#92400e}.c-amber>.t{fill:#78350f}.c-amber>.ts{fill:#b45309}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray"><rect x="80" y="40" width="520" height="48" rx="8"/><text class="th" x="340" y="62" text-anchor="middle">100 users → POST /research/generate</text><text class="ts" x="340" y="79" text-anchor="middle">100 distinct tickers (worst case — no dedup)</text></g>

<g class="c-gray"><rect x="80" y="116" width="520" height="50" rx="8"/><text class="th" x="340" y="138" text-anchor="middle">Admission gate (pre-charge)</text><text class="ts" x="340" y="156" text-anchor="middle">per-user ≤4 · global ≤150 → all 100 admitted, else 409</text></g>

<g class="c-gray"><rect x="80" y="194" width="520" height="46" rx="8"/><text class="th" x="340" y="215" text-anchor="middle">Charge 5 credits · 100 pending rows · 100 tasks</text><text class="ts" x="340" y="231" text-anchor="middle">fire-and-forget asyncio tasks</text></g>

<g class="c-gray"><rect x="80" y="268" width="520" height="46" rx="8"/><text class="th" x="340" y="289" text-anchor="middle">Shared cache lookup → 100 misses</text><text class="ts" x="340" y="305" text-anchor="middle">distinct tickers = no dedup (same ticker → 1 run)</text></g>

<g class="c-gray"><rect x="80" y="342" width="520" height="72" rx="8"/></g>
<text class="th" x="340" y="362" text-anchor="middle">Global agent-run semaphore = 8 (the gate)</text>
<g class="c-green"><rect x="100" y="374" width="170" height="30" rx="6"/><text class="th" x="185" y="393" text-anchor="middle">8 running</text></g>
<g class="c-amber"><rect x="290" y="374" width="290" height="30" rx="6"/><text class="th" x="435" y="393" text-anchor="middle">92 queued → drained in waves</text></g>

<g class="c-amber"><rect x="80" y="442" width="250" height="58" rx="8"/><text class="th" x="205" y="465" text-anchor="middle">FMP ~25–40 calls</text><text class="ts" x="205" y="483" text-anchor="middle">shared 20-conn pool · 750 RPM</text></g>
<g class="c-amber"><rect x="350" y="442" width="250" height="58" rx="8"/><text class="th" x="475" y="465" text-anchor="middle">Gemini ~22 calls</text><text class="ts" x="475" y="483" text-anchor="middle">15 Stage-B parallel · tier ceiling</text></g>

<g class="c-green"><rect x="80" y="528" width="520" height="48" rx="8"/><text class="th" x="340" y="550" text-anchor="middle">Conditional completion write → delivered</text><text class="ts" x="340" y="567" text-anchor="middle">XOR refund safety net (processing_started_at clock)</text></g>

<line class="arr" x1="340" y1="88" x2="340" y2="114" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="166" x2="340" y2="192" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="240" x2="340" y2="266" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="314" x2="340" y2="340" marker-end="url(#arrow)"/>
<line class="arr" x1="185" y1="404" x2="205" y2="440" marker-end="url(#arrow)"/>
<line class="arr" x1="240" y1="404" x2="465" y2="440" marker-end="url(#arrow)"/>
<line class="arr" x1="205" y1="500" x2="320" y2="526" marker-end="url(#arrow)"/>
<line class="arr" x1="475" y1="500" x2="360" y2="526" marker-end="url(#arrow)"/>

<rect x="80" y="596" width="12" height="12" rx="2" class="c-gray"/><text class="ts" x="98" y="606" text-anchor="start">pipeline step</text>
<rect x="240" y="596" width="12" height="12" rx="2" class="c-green"/><text class="ts" x="258" y="606" text-anchor="start">running / delivered</text>
<rect x="430" y="596" width="12" height="12" rx="2" class="c-amber"/><text class="ts" x="448" y="606" text-anchor="start">bottleneck / queued</text>
</svg>
